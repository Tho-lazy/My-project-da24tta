<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Hệ thống đăng nhập</title>
		<meta charset = "utf-8">
		<link rel="stylesheet" href="../css/style2.css">
	</head>
	<body>
		<div class="container">
			<from id="login">
				<h3 id="title">Tên đăng nhập</h3>
				<div class = "form-group">
					<label for = "txtUsername">Tên đăng nhập :</label>
					<input class="form-control" type = "text" id = "txtUsername" name = "txtUsername">
				</div>
				<div class = "form-group">
					<label for = "txtPassword">Mật khẩu: </label>
					<input class = "form-control" type = "password" id = "txtPassword" name = "txtUsername">
				</div>
				<input class = "button" type = "submit" id ="sbLogin" value = "Đăng nhập">
				<input class = "button" type = "reset" id = "rsCancel" id = "rsCancel" name = "rsCancel" value = "Nhập lại">
			</from>
		</div>
	</body>
</html>
