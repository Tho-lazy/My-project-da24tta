<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Chi tiết sản phẩm</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #p-image { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row m-5">
            <div class="col-sm-4">
                <img id="p-image" src="" alt="">
            </div>
            <div class="col-sm-8 card">
                <div class="card-body">
                    <h3 id="p-name" class="card-title text-primary">Tên sản phẩm</h3>
                    <p id="p-price" class="card-title text-danger fw-bolder">Giá sản phẩm</p>
                    <p id="p-description" class="card-text">Mô tả sản phẩm</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lib.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = parseInt(params.get("id"));

        const product = productDatabase.find(function(p) {
            return p.id === productId;
        });

        if (product) {
            document.getElementById("p-image").src = product.img;
            document.getElementById("p-image").alt = product.name;
            document.getElementById("p-name").innerText = product.name;
            document.getElementById("p-price").innerText = product.price.toLocaleString("vi-VN") + " VNĐ";
            document.getElementById("p-description").innerText = product.desc;
        } else {
            document.getElementById("p-name").innerText = "Không tìm thấy sản phẩm!";
        }
    </script>
</body>
</html>
