<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế trang hiển thị sản phẩm</title>
    <meta charset="utf-8">
    <script src="../js/lib.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-item {
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
        }
        .product-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .product-info { padding: 8px 0; }
        .product-name {
            font-weight: bold;
            margin: 6px 0 4px;
        }
        .product-price {
            color: #333;
            margin-bottom: 8px;
        }
        .btn-detail {
            display: inline-block;
            padding: 5px 14px;
            background-color: #0929df94;
            color: #000;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-detail:hover { background-color: #0b67bd; }
    </style>
</head>
<body>
    <div class="container-fluid mt-5">
        <div id="product-list" class="row"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        addProduct_v2(productDatabase);
    </script>
</body>
</html>
